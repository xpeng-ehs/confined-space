<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- 背景：汽车厂车间背景 -->
  <rect width="800" height="500" fill="#f8f9fa" />
  
  <!-- 工业格栅地面背景 -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)" />

  <!-- 顶部流程导航（体现先后顺序） -->
  <g transform="translate(100, 30)">
    <!-- 步骤一底色 -->
    <rect id="step1-bg" x="0" y="0" width="280" height="40" rx="20" fill="#cbd5e1">
      <animate attributeName="fill" from="#cbd5e1" to="#3b82f6" dur="0.5s" begin="0.5s" fill="freeze" />
    </rect>
    <text x="140" y="26" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">首先：环境识别与风险告知</text>
    
    <!-- 连接箭头 -->
    <path d="M300 20 L330 20" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrowhead)" />
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
      </marker>
    </defs>

    <!-- 步骤二底色 -->
    <rect id="step2-bg" x="350" y="0" width="280" height="40" rx="20" fill="#cbd5e1">
      <animate attributeName="fill" from="#cbd5e1" to="#10b981" dur="0.5s" begin="2.5s" fill="freeze" />
    </rect>
    <text x="490" y="26" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">随后：物理隔离与能源锁止</text>
  </g>

  <!-- 内容区域 -->

  <!-- 识别与告知模块 -->
  <g id="logic-identification" transform="translate(480, 100)">
    <!-- 警示牌动画 -->
    <g id="signage" transform="translate(50, 50)" opacity="0">
      <rect x="0" y="0" width="130" height="170" rx="8" fill="#fff" stroke="#ef4444" stroke-width="3" />
      <rect x="0" y="0" width="130" height="45" rx="8" fill="#ef4444" />
      <text x="65" y="32" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#fff" text-anchor="middle">危险！</text>
      <text x="65" y="75" font-family="Microsoft YaHei" font-weight="bold" font-size="14" fill="#000" text-anchor="middle">有限空间</text>
      <text x="65" y="105" font-family="Microsoft YaHei" font-size="12" fill="#333" text-anchor="middle">未经许可禁止进入</text>
      <path d="M50 130 L80 130 L65 155 Z" fill="#fbbf24" stroke="#000" stroke-width="1" />
      
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.8s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" from="50,80" to="50,50" dur="0.8s" begin="0.8s" fill="freeze" />
    </g>
    <text x="115" y="250" font-family="Microsoft YaHei" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">设置明显警示标志</text>
  </g>

  <!-- 隔离模块 -->
  <g id="logic-isolation" transform="translate(60, 100)">
    <!-- 管道隔离 -->
    <g transform="translate(0, 30)">
      <rect x="0" y="40" width="200" height="20" fill="#94a3b8" />
      <circle cx="100" cy="50" r="25" fill="#ef4444" stroke="#450a0a" stroke-width="2" />
      <rect x="95" y="20" width="10" height="60" rx="2" fill="#450a0a" />
      <!-- 挂锁 -->
      <g opacity="0">
        <path d="M90 40 L90 30 A10 10 0 0 1 110 30 L110 40" fill="none" stroke="#fbbf24" stroke-width="4" />
        <rect x="85" y="40" width="30" height="25" rx="2" fill="#fbbf24" />
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3s" fill="freeze" />
      </g>
      <text x="100" y="100" font-family="Microsoft YaHei" font-size="13" fill="#475569" text-anchor="middle">管道可靠切断/加装盲板</text>
    </g>

    <!-- 电力隔离 -->
    <g transform="translate(0, 160)">
      <rect x="50" y="0" width="100" height="80" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
      <path d="M100 20 L100 60" stroke="#000" stroke-width="8" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0 100 40" to="90 100 40" dur="0.3s" begin="4s" fill="freeze" />
      </path>
      <!-- 锁定标识 -->
      <g opacity="0">
        <circle cx="100" cy="40" r="15" fill="none" stroke="#ef4444" stroke-width="3" />
        <path d="M90 30 L110 50 M110 30 L90 50" stroke="#ef4444" stroke-width="3" />
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze" />
      </g>
      <text x="100" y="110" font-family="Microsoft YaHei" font-size="13" fill="#475569" text-anchor="middle">动力电源挂牌上锁</text>
    </g>
  </g>

  <!-- 中心入口展示 -->
  <g transform="translate(400, 420)">
    <ellipse cx="0" cy="10" rx="150" ry="30" fill="#334155" />
    <path d="M-150 0 L150 0" stroke="#fbbf24" stroke-width="8" stroke-dasharray="20 10" />
    <text x="0" y="45" font-family="Microsoft YaHei" font-size="14" fill="#64748b" text-anchor="middle" font-weight="bold">待进入有限空间</text>
  </g>

  <!-- 阶段提示文字 -->
  <rect x="330" y="460" width="140" height="30" rx="15" fill="#f1f5f9" />
  <text x="400" y="480" font-family="Microsoft YaHei" font-size="12" fill="#475569" text-anchor="middle">安全作业准备流程</text>
</svg>
