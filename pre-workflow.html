  <defs>

      .dark-stroke { fill: none; stroke: #2c3e50; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

      .flow-line { fill: none; stroke-width: 3; stroke-dasharray: 8, 8; stroke-linecap: round; }
      .solid-line { fill: none; stroke-width: 3; stroke-linecap: round; }

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 Z" fill="#2980b9" /></marker>
  </defs>

  <rect x="0" y="0" width="1400" height="650" fill="#fcfdfd" />
  <text x="700" y="45" font-family="Microsoft YaHei" font-size="24" fill="#34495e" font-weight="bold" text-anchor="middle">有限空间前期准备与全流程管理体系</text>
  <line x1="50" y1="70" x2="1350" y2="70" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="10,5" />

  <path d="M 380 300 Q 520 300 520 200 L 520 180" class="flow-line" stroke="#1abc9c" marker-end="url(#arrow-teal)"><animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite" /></path>
  <path d="M 380 450 Q 700 450 700 280" class="flow-line" stroke="#1abc9c" marker-end="url(#arrow-teal)"><animate attributeName="stroke-dashoffset" values="16;0" dur="1.2s" repeatCount="indefinite" /></path>

  <path d="M 1000 450 Q 700 450 700 280" class="flow-line" stroke="#2980b9" marker-end="url(#arrow-blue)"><animate attributeName="stroke-dashoffset" values="16;0" dur="1s" repeatCount="indefinite" /></path>

  <g transform="translate(180, 220)">
    <rect x="-120" y="-100" width="280" height="380" rx="15" fill="#e8f8f5" stroke="#1abc9c" stroke-width="3" stroke-dasharray="8,4" />
    <rect x="-80" y="-120" width="160" height="40" rx="20" fill="#1abc9c" />
    <text x="0" y="-93" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">属地基础管理</text>

    <g transform="translate(-60, -20)">
      <rect x="-40" y="-30" width="80" height="50" rx="4" fill="#fff" stroke="#1abc9c" stroke-width="3" />
      <line x1="-25" y1="-15" x2="10" y2="-15" class="dark-stroke" stroke-width="2"/>
      <line x1="-25" y1="0" x2="25" y2="0" class="dark-stroke" stroke-width="2"/>
      <line x1="-25" y1="15" x2="5" y2="15" class="dark-stroke" stroke-width="2"/>
      <path d="M 15 5 L 25 -15 L 30 -12 L 20 8 Z" fill="#f1c40f" stroke="#34495e" stroke-width="1.5">
         <animateTransform attributeName="transform" type="translate" values="0,0; -15,-5; 0,0" dur="1.5s" repeatCount="indefinite" />
      </path>
      <text x="0" y="45" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">辨识与台账</text>
    </g>

    <g transform="translate(60, -20)">
      <polygon points="0,-30 -35,20 35,20" fill="#f1c40f" stroke="#e67e22" stroke-width="3" />
      <text x="0" y="5" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#c0392b" text-anchor="middle">!</text>
      <polygon points="0,-30 -35,20 35,20" fill="none" stroke="#e74c3c" stroke-width="4">
         <animate attributeName="opacity" values="0; 1; 0" dur="1s" repeatCount="indefinite" />
         <animateTransform attributeName="transform" type="scale" values="1; 1.2; 1" dur="1s" repeatCount="indefinite" />
      </polygon>
      <text x="0" y="45" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">警示与告知牌</text>
    </g>

    <g transform="translate(0, 150)">
      <path d="M -60 -40 L -60 -20 L -80 0 L -80 60 L 80 60 L 80 0 L 60 -20 L 60 -40" class="tank" />
      <circle cx="-30" cy="30" r="15" fill="#9b59b6" opacity="0.4"><animate attributeName="r" values="15;20;15" dur="3s" repeatCount="indefinite" /></circle>
      <circle cx="30" cy="40" r="20" fill="#9b59b6" opacity="0.3"><animate attributeName="r" values="20;25;20" dur="4s" repeatCount="indefinite" /></circle>
      <text x="0" y="90" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">作业内容评估 & 属地准入</text>
    </g>
  </g>

  <g transform="translate(700, 220)">
    <rect x="-140" y="-100" width="280" height="150" rx="15" fill="#f4eefa" stroke="#9b59b6" stroke-width="3" stroke-dasharray="8,4" />
    <rect x="-80" y="-120" width="160" height="40" rx="20" fill="#9b59b6" />
    <text x="0" y="-93" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">外包与联合管控</text>

    <g transform="translate(-50, -10)">
      <rect x="-30" y="-25" width="60" height="40" rx="4" fill="#fff" stroke="#9b59b6" stroke-width="2" />
      <line x1="-15" y1="-10" x2="15" y2="-10" class="dark-stroke" stroke-width="1.5"/>
      <line x1="-15" y1="0" x2="5" y2="0" class="dark-stroke" stroke-width="1.5"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="1.2s" repeatCount="indefinite" />
        <path d="M -15 20 Q -5 10 0 15 Q 5 10 15 20" fill="none" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
        <path d="M 0 15 L 0 25" fill="none" stroke="#2c3e50" stroke-width="4" stroke-linecap="round"/>
      </g>
      <text x="0" y="45" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">资质审核与协议</text>
    </g>

    <g transform="translate(60, -10)">
      <rect x="-25" y="-30" width="50" height="60" rx="4" fill="#fff" stroke="#34495e" stroke-width="2" />
      <rect x="-15" y="-20" width="8" height="8" fill="none" stroke="#bdc3c7" stroke-width="1.5"/>
      <rect x="-15" y="0" width="8" height="8" fill="none" stroke="#bdc3c7" stroke-width="1.5"/>
      <rect x="-15" y="20" width="8" height="8" fill="none" stroke="#bdc3c7" stroke-width="1.5"/>
      <line x1="0" y1="-16" x2="15" y2="-16" stroke="#bdc3c7" stroke-width="2" />
      <line x1="0" y1="4" x2="15" y2="4" stroke="#bdc3c7" stroke-width="2" />
      <line x1="0" y1="24" x2="15" y2="24" stroke="#bdc3c7" stroke-width="2" />
      <path d="M -16 -18 L -12 -12 L -6 -22" fill="none" stroke="#2ecc71" stroke-width="2.5"><animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" /></path>
      <path d="M -16 2 L -12 8 L -6 -2" fill="none" stroke="#2ecc71" stroke-width="2.5"><animate attributeName="opacity" values="0;0;1;0" dur="3s" repeatCount="indefinite" /></path>
      <path d="M -16 22 L -12 28 L -6 18" fill="none" stroke="#2ecc71" stroke-width="2.5"><animate attributeName="opacity" values="0;0;1;1" dur="3s" repeatCount="indefinite" /></path>
      
      <text x="0" y="55" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">联合确认与审批</text>
    </g>

    <rect x="-60" y="80" width="120" height="30" rx="15" fill="#34495e" />
    <text x="0" y="100" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">多方现场监管联动</text>
  </g>

  <g transform="translate(1120, 220)">
    <rect x="-120" y="-100" width="260" height="380" rx="15" fill="#ebf5fb" stroke="#2980b9" stroke-width="3" stroke-dasharray="8,4" />
    <rect x="-90" y="-120" width="180" height="40" rx="20" fill="#2980b9" />
    <text x="0" y="-93" font-family="Microsoft YaHei" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">培训与应急准备</text>

    <g transform="translate(0, -20)">
      <rect x="-50" y="-40" width="100" height="60" rx="4" fill="#34495e" />
      <rect x="-45" y="-35" width="90" height="40" fill="#ecf0f1" />
      <polygon points="0,20 -10,30 10,30" fill="#34495e" />
      <line x1="-20" y1="30" x2="20" y2="30" stroke="#34495e" stroke-width="3" />
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; -90,0; -90,0; 0,0" dur="6s" repeatCount="indefinite" />
        <text x="0" y="-18" font-family="Microsoft YaHei" font-size="10" font-weight="bold" fill="#2980b9" text-anchor="middle">培训1：法规与案例</text>
        <line x1="-20" y1="-8" x2="20" y2="-8" stroke="#7f8c8d" stroke-width="2"/>
        <line x1="-20" y1="-2" x2="10" y2="-2" stroke="#7f8c8d" stroke-width="2"/>
        <text x="90" y="-18" font-family="Microsoft YaHei" font-size="10" font-weight="bold" fill="#e74c3c" text-anchor="middle">培训2：防护与自救</text>
        <circle cx="90" cy="-5" r="5" fill="#e74c3c" />
      </g>
      <text x="0" y="55" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">全员专项安全培训</text>
    </g>

    <g transform="translate(0, 140)">
      <path d="M -30 -30 L 30 -30 L 30 0 Q 30 30 0 40 Q -30 30 -30 0 Z" fill="#e74c3c" />
      <rect x="-6" y="-15" width="12" height="30" fill="#fff" />
      <rect x="-15" y="-6" width="30" height="12" fill="#fff" />
      <path d="M -35 -35 L 35 -35 L 35 0 Q 35 35 0 45 Q -35 35 -35 0 Z" fill="none" stroke="#e74c3c" stroke-width="3">
         <animate attributeName="opacity" values="1; 0; 1" dur="2s" repeatCount="indefinite" />
         <animateTransform attributeName="transform" type="scale" values="1; 1.2; 1" dur="2s" repeatCount="indefinite" />
      </path>
      <text x="0" y="70" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">专项应急预案与器材</text>
    </g>
  </g>


  <line x1="50" y1="520" x2="1350" y2="520" stroke="#bdc3c7" stroke-width="2" />

  <g transform="translate(40, 560)">
    <rect x="0" y="0" width="420" height="500" fill="#e8f8f5" rx="10" />
    <path d="M 0 10 Q 0 0 10 0 L 410 0 Q 420 0 420 10 L 420 50 L 0 50 Z" fill="#1abc9c" />
    <text x="210" y="32" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">属地管理单位 (区域直接管理方)</text>
    
    <rect x="20" y="70" width="6" height="20" fill="#16a085" rx="3" />
    <text x="35" y="86" fill="#16a085" class="box-title">辨识建档与作业评估</text>
    <text x="35" y="115" class="box-desc">对管辖区域全面辨识，建立并动态更新《有限空间管理</text>
    <text x="35" y="137" class="box-desc">台账》。根据设备工艺评估可能进行的作业内容与频</text>
    <text x="35" y="159" class="box-desc">率，为资源配备和预案提供依据。</text>
    
    <rect x="20" y="190" width="6" height="20" fill="#16a085" rx="3" />
    <text x="35" y="206" fill="#16a085" class="box-title">设置警示标志与告知</text>
    <text x="35" y="235" class="box-desc">在出入口醒目位置设置“危险勿入”、危险提示及联系</text>
    <text x="35" y="257" class="box-desc">电话。在集中布置区设立《安全风险告知牌》。</text>

    <rect x="20" y="290" width="6" height="20" fill="#16a085" rx="3" />
    <text x="35" y="306" fill="#16a085" class="box-title">属地准入与现场管理</text>
    <text x="35" y="335" class="box-desc">作业前对入场人员进行本辖区风险、制度与设施的属地</text>
    <text x="35" y="357" class="box-desc">安全告知。参与作业前联合确认。指派现场检查员进行</text>
    <text x="35" y="379" class="box-desc">日常监管；发生事故时，立即启动先期处置。</text>

    <path d="M 20 420 L 400 420" stroke="#16a085" stroke-width="1" stroke-dasharray="4,4" />
    <text x="35" y="445" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#16a085">专属培训要求：</text>
    <text x="135" y="445" class="box-desc">每年对<tspan class="highlight-text">现场安全检查人员</tspan>进行专项培训。</text>
  </g>


  <g transform="translate(490, 560)">
    <rect x="0" y="0" width="420" height="500" fill="#f4eefa" rx="10" />
    <path d="M 0 10 Q 0 0 10 0 L 410 0 Q 420 0 420 10 L 420 50 L 0 50 Z" fill="#9b59b6" />
    <text x="210" y="32" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">项目发包单位 (任务委托与统筹方)</text>
    
    <rect x="20" y="70" width="6" height="20" fill="#8e44ad" rx="3" />
    <text x="35" y="86" fill="#8e44ad" class="box-title">外包资质审核与协议</text>
    <text x="35" y="115" class="box-desc">严禁以包代管。严格审核作业单位营业执照、许可及人员</text>
    <text x="35" y="137" class="box-desc">持证等安全生产条件，签订专门安全生产管理协议，</text>
    <text x="35" y="159" class="box-desc">明确双方安全与应急处置边界。</text>
    
    <rect x="20" y="190" width="6" height="20" fill="#8e44ad" rx="3" />
    <text x="35" y="206" fill="#8e44ad" class="box-title">项目审批与联合确认</text>
    <text x="35" y="235" class="box-desc">负责对发包的有限空间作业进行专门审批。在作业启动</text>
    <text x="35" y="257" class="box-desc">前，牵头与属地单位、作业单位共同进行现场安全条件</text>
    <text x="35" y="279" class="box-desc">的联合检查与确认。</text>

    <rect x="20" y="310" width="6" height="20" fill="#8e44ad" rx="3" />
    <text x="35" y="326" fill="#8e44ad" class="box-title">整体监管与事故统筹</text>
    <text x="35" y="355" class="box-desc">指派项目安全员对整体实施进行监督，协调跨单位问题。</text>
    <text x="35" y="377" class="box-desc">发生事故时，负责统一协调、指挥现场全局应急处置。</text>

    <path d="M 20 420 L 400 420" stroke="#8e44ad" stroke-width="1" stroke-dasharray="4,4" />
    <text x="35" y="445" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#8e44ad">专属培训要求：</text>
    <text x="135" y="445" class="box-desc">每年对<tspan class="highlight-text">审批人</tspan>与<tspan class="highlight-text">项目安全员</tspan>进行专项培训。</text>
  </g>


  <g transform="translate(940, 560)">
    <rect x="0" y="0" width="420" height="500" fill="#ebf5fb" rx="10" />
    <path d="M 0 10 Q 0 0 10 0 L 410 0 Q 420 0 420 10 L 420 50 L 0 50 Z" fill="#2980b9" />
    <text x="210" y="32" font-family="Microsoft YaHei" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">作业单位保障与全员培训体系</text>
    
    <rect x="20" y="70" width="6" height="20" fill="#2980b9" rx="3" />
    <text x="35" y="86" fill="#2980b9" class="box-title">应急预案与物资配备</text>
    <text x="35" y="115" class="box-desc">作为安全主体责任方，需结合现场特点制定《专项应急</text>
    <text x="35" y="137" class="box-desc">预案》或现场处置方案。必须配齐并正确使用气体检测仪、</text>
    <text x="35" y="159" class="box-desc">防护用品和应急救援装备。</text>
    
    <rect x="20" y="190" width="6" height="20" fill="#2980b9" rx="3" />
    <text x="35" y="206" fill="#2980b9" class="box-title">一线作业力量专项培训</text>
    <text x="35" y="235" class="box-desc">作业单位每年至少1次对<tspan class="highlight-text">作业负责人</tspan>、<tspan class="highlight-text">监护人</tspan>、<tspan class="highlight-text">作业人</tspan></text>
    <text x="35" y="257" class="box-desc">及<tspan class="highlight-text">应急救援人员</tspan>进行培训并考核合格。（新上岗/转岗</text>
    <text x="35" y="279" class="box-desc">人员必须在上岗前完成培训）。</text>

    <rect x="20" y="310" width="6" height="20" fill="#f39c12" rx="3" />
    <text x="35" y="326" fill="#f39c12" class="box-title">各方培训通用核心内容</text>
    <text x="35" y="355" class="box-desc">培训需如实记录并归档，内容应硬性包含：</text>
    <text x="35" y="377" class="box-desc">1. 法律法规(GB 46768等)及企业内部制度；</text>
    <text x="35" y="399" class="box-desc">2. 危险因素识别、安全操作规程与典型事故案例；</text>
    <text x="35" y="421" class="box-desc">3. 仪表的正确使用与个体装备防护方法；</text>
    <text x="35" y="443" class="box-desc">4. 紧急情况下的应急处置措施与自救互救知识。</text>
  </g>

</svg>
