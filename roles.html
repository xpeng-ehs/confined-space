<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
  <defs>
    <style>
      .text-title { font-family: "Microsoft YaHei", sans-serif; font-size: 26px; font-weight: bold; fill: #2c3e50; text-anchor: middle; }
      .box-title { font-family: "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: bold; }
      .box-desc { font-family: "Microsoft YaHei", sans-serif; font-size: 14px; fill: #555555; }
      .ground { stroke: #34495e; stroke-width: 4; stroke-linecap: round; }
      .tank { fill: #ecf0f1; stroke: #34495e; stroke-width: 4; stroke-linejoin: round; }
      .worker { stroke: #2c3e50; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .helmet { fill: #f1c40f; }
      .rope { stroke: #e67e22; stroke-width: 2.5; stroke-dasharray: 5,5; }
      .tripod { stroke: #95a5a6; stroke-width: 4; stroke-linecap: round; }
      .vision-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 6, 4; }
      .flow-line { fill: none; stroke: #bdc3c7; stroke-width: 3; stroke-dasharray: 8, 8; }
      .arrow { fill: #bdc3c7; }
    </style>
  </defs>

  <rect x="0" y="0" width="380" height="550" fill="#f8f9fa" />
  <text x="190" y="40" font-family="Microsoft YaHei" font-size="16" fill="#bdc3c7" font-weight="bold" text-anchor="middle">后方：管理与审批区</text>
  
  <rect x="380" y="0" width="620" height="550" fill="#ffffff" />
  <text x="690" y="40" font-family="Microsoft YaHei" font-size="16" fill="#bdc3c7" font-weight="bold" text-anchor="middle">前方：现场作业区</text>
  
  <line x1="380" y1="0" x2="380" y2="550" stroke="#ecf0f1" stroke-width="4" stroke-dasharray="15,10" />

  <g transform="translate(100, 100)">
    <rect x="-45" y="-60" width="90" height="28" rx="14" fill="#9b59b6" />
    <text x="0" y="-40" font-family="Microsoft YaHei" font-size="14" fill="#fff" text-anchor="middle">发包单位</text>
    <circle cx="0" cy="-10" r="12" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2.5" />
    <path d="M -15 10 L 15 10 L 20 40 L -20 40 Z" fill="#34495e" /> <rect x="-30" y="30" width="60" height="15" fill="#bdc3c7" rx="2" /> <rect x="5" y="15" width="15" height="20" fill="#fff" stroke="#95a5a6" stroke-width="1">
       <animate attributeName="x" values="5; 45; 5" dur="3s" repeatCount="indefinite" />
       <animate attributeName="y" values="15; 45; 15" dur="3s" repeatCount="indefinite" />
       <animate attributeName="opacity" values="1; 0; 1" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

  <g transform="translate(100, 360)">
    <rect x="-50" y="-60" width="100" height="28" rx="14" fill="#34495e" />
    <text x="0" y="-40" font-family="Microsoft YaHei" font-size="14" fill="#fff" text-anchor="middle">作业审批人</text>
    <circle cx="0" cy="-10" r="12" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2.5" />
    <path d="M -15 10 L 15 10 L 20 40 L -20 40 Z" fill="#2980b9" /> <rect x="-30" y="30" width="60" height="15" fill="#bdc3c7" rx="2" /> <rect x="-10" y="25" width="20" height="25" fill="#fff" stroke="#95a5a6" stroke-width="1" /> <g>
      <animateTransform attributeName="transform" type="translate" values="0,-15; 0,0; 0,-15" dur="1.5s" repeatCount="indefinite" />
      <rect x="0" y="15" width="10" height="15" fill="#c0392b" />
      <rect x="-5" y="30" width="20" height="5" fill="#e74c3c" />
    </g>
    <path d="M -5 30 L 0 35 L 10 22" fill="none" stroke="#2ecc71" stroke-width="3">
       <animate attributeName="opacity" values="0; 1; 0" dur="1.5s" repeatCount="indefinite" />
    </path>
  </g>

  <g transform="translate(280, 220)">
    <rect x="-45" y="-70" width="90" height="28" rx="14" fill="#2980b9" />
    <text x="0" y="-50" font-family="Microsoft YaHei" font-size="14" fill="#fff" text-anchor="middle">作业单位</text>
    <circle cx="0" cy="-20" r="12" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2.5" />
    <path d="M -14 -23 A 14 14 0 0 1 14 -23 Z" class="helmet" />
    <path d="M -15 0 L 15 0 L 15 40 L -15 40 Z" fill="#3498db" /> <rect x="-10" y="10" width="20" height="25" fill="#ecf0f1" /> <line x1="-5" y1="15" x2="5" y2="15" stroke="#bdc3c7" stroke-width="2"/>
    <line x1="-5" y1="20" x2="5" y2="20" stroke="#bdc3c7" stroke-width="2"/>
    <g opacity="0.2" stroke="#2c3e50" stroke-width="3" fill="none">
      <circle cx="30" cy="-20" r="15" />
      <path d="M 30 -40 L 30 -30 M 30 -10 L 30 0 M 10 -20 L 20 -20 M 40 -20 L 50 -20 M 15 -35 L 22 -28 M 38 -12 L 45 -5 M 45 -35 L 38 -28 M 22 -12 L 15 -5" />
      <animateTransform attributeName="transform" type="rotate" from="0 30 -20" to="360 30 -20" dur="4s" repeatCount="indefinite" />
    </g>
  </g>

  <path d="M 160 120 Q 220 120 250 160" class="flow-line">
      <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite" />
  </path>
  <polygon points="250,160 240,150 255,145" class="arrow" />

  <path d="M 160 380 Q 250 380 400 350" class="flow-line">
      <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite" />
  </path>

  <path d="M 320 240 Q 380 240 450 300" class="flow-line">
      <animate attributeName="stroke-dashoffset" values="16;0" dur="0.8s" repeatCount="indefinite" />
  </path>
  <polygon points="450,300 440,290 455,285" class="arrow" />

  <line x1="380" y1="420" x2="680" y2="420" class="ground" />
  <line x1="820" y1="420" x2="980" y2="420" class="ground" />
  
  <path d="M 680 420 L 680 460 L 610 500 L 610 550 L 890 550 L 890 500 L 820 460 L 820 420" class="tank" />

  <g transform="translate(500, 420)">
    <rect x="-50" y="-115" width="100" height="28" rx="14" fill="#e67e22" />
    <text x="0" y="-95" font-family="Microsoft YaHei" font-size="14" fill="#fff" text-anchor="middle">作业负责人</text>
    <line x1="0" y1="-85" x2="0" y2="-65" stroke="#e67e22" stroke-width="2" />
    <line x1="0" y1="-45" x2="0" y2="-15" class="worker" />
    <line x1="0" y1="-15" x2="-10" y2="0" class="worker" />
    <line x1="0" y1="-15" x2="10" y2="0" class="worker" />
    <circle cx="0" cy="-55" r="10" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2.5" />
    <path d="M -12 -57 A 12 12 0 0 1 12 -57 Z" class="helmet" />
    <path d="M -8 -40 L 8 -40 L 8 -20 L -8 -20 Z" fill="#e67e22" opacity="0.8"/> <line x1="0" y1="-40" x2="25" y2="-25" class="worker">
       <animate attributeName="y2" values="-25; -35; -25" dur="1s" repeatCount="indefinite" />
    </line>
    <path d="M 30 -35 Q 35 -45 40 -35 M 35 -30 Q 42 -42 48 -30" fill="none" stroke="#e67e22" stroke-width="2">
       <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </path>
  </g>

  <g transform="translate(640, 420)">
    <rect x="-35" y="-115" width="70" height="28" rx="14" fill="#e74c3c" />
    <text x="0" y="-95" font-family="Microsoft YaHei" font-size="14" fill="#fff" text-anchor="middle">监护人</text>
    <line x1="0" y1="-85" x2="0" y2="-65" stroke="#e74c3c" stroke-width="2" />
    <line x1="0" y1="-45" x2="0" y2="-15" class="worker" />
    <line x1="0" y1="-15" x2="-10" y2="0" class="worker" />
    <line x1="0" y1="-15" x2="10" y2="0" class="worker" />
    <circle cx="0" cy="-55" r="10" fill="#ecf0f1" stroke="#2c3e50" stroke-width="2.5" />
    <path d="M -12 -57 A 12 12 0 0 1 12 -57 Z" class="helmet" />
    <line x1="0" y1="-40" x2="15" y2="-25" class="worker" />
    <rect x="12" y="-25" width="8" height="12" fill="#e74c3c" rx="2" />
    <circle cx="16" cy="-22" r="1.5" fill="#2ecc71">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
    </circle>
    <line x1="10" y1="-55" x2="90" y2="20" class="vision-line">
       <animate attributeName="stroke-dashoffset" values="0;10" dur="0.8s" repeatCount="indefinite" />
    </line>
    <line x1="10" y1="-55" x2="130" y2="70" class="vision-line">
       <animate attributeName="stroke-dashoffset" values="0;10" dur="1.2s" repeatCount="indefinite" />
    </line>
  </g>

  <line x1="750" y1="310" x2="710" y2="420" class="tripod" />
  <line x1="750" y1="310" x2="790" y2="420" class="tripod" />
  <circle cx="750" cy="310" r="6" fill="#7f8c8d" />
  <line x1="750" y1="310" x2="750" y2="500" class="rope" /> 

  <g transform="translate(750, 520)">
    <rect x="30" y="-80" width="70" height="28" rx="14" fill="#16a085" />
    <text x="65" y="-60" font-family="Microsoft YaHei" font-size="14" fill="#fff" text-anchor="middle">作业人</text>
    <line x1="10" y1="-45" x2="30" y2="-65" stroke="#16a085" stroke-width="2" />
    <circle cx="0" cy="-35" r="12" stroke="#2c3e50" stroke-width="3" fill="#ecf0f1" />
    <path d="M -14 -38 A 14 14 0 0 1 14 -38 Z" class="helmet" />
    <line x1="0" y1="-23" x2="0" y2="15" class="worker" />
    <path d="M -8 -15 L 8 -15 M -8 5 L 8 5" stroke="#e74c3c" stroke-width="2" /> <line x1="0" y1="-15" x2="-18" y2="0" class="worker">
       <animate attributeName="y2" values="0; -8; 0" dur="1s" repeatCount="indefinite" />
    </line>
    <line x1="0" y1="-15" x2="18" y2="0" class="worker">
       <animate attributeName="y2" values="0; 8; 0" dur="1s" repeatCount="indefinite" />
    </line>
    <line x1="0" y1="15" x2="-15" y2="30" class="worker" />
    <line x1="0" y1="15" x2="15" y2="30" class="worker" />
  </g>

  <line x1="40" y1="560" x2="960" y2="560" stroke="#bdc3c7" stroke-width="2" />
  
  <g transform="translate(40, 590)">
    <rect x="0" y="0" width="6" height="20" fill="#9b59b6" rx="3" />
    <text x="15" y="16" fill="#9b59b6" class="box-title">发包单位</text>
    <text x="15" y="45" class="box-desc">将有限空间作业任务进行委托或指派的部门或管</text>
    <text x="15" y="67" class="box-desc">理方。负责审核作业单位资质、签订安全协议、</text>
    <text x="15" y="89" class="box-desc">对发包作业进行审批、统一协调、安全检查及统</text>
    <text x="15" y="111" class="box-desc">筹事故应急处置。</text>
  </g>

  <g transform="translate(360, 590)">
    <rect x="0" y="0" width="6" height="20" fill="#2980b9" rx="3" />
    <text x="15" y="16" fill="#2980b9" class="box-title">作业单位</text>
    <text x="15" y="45" class="box-desc">进入有限空间实施作业的部门或承包商。是作业</text>
    <text x="15" y="67" class="box-desc">安全主体责任方。负责建立台账、配备设备、开</text>
    <text x="15" y="89" class="box-desc">展培训、制定应急预案，以及实施从风险评估到</text>
    <text x="15" y="111" class="box-desc">完工验收的全流程管理。</text>
  </g>

  <g transform="translate(680, 590)">
    <rect x="0" y="0" width="6" height="20" fill="#34495e" rx="3" />
    <text x="15" y="16" fill="#34495e" class="box-title">作业审批人</text>
    <text x="15" y="45" class="box-desc">负责有限空间作业审批的人员。</text>
  </g>

  <g transform="translate(40, 730)">
    <rect x="0" y="0" width="6" height="20" fill="#e67e22" rx="3" />
    <text x="15" y="16" fill="#e67e22" class="box-title">作业负责人</text>
    <text x="15" y="45" class="box-desc">在作业现场负责组织实施有限空间作业的</text>
    <text x="15" y="67" class="box-desc">人员。</text>
  </g>

  <g transform="translate(360, 730)">
    <rect x="0" y="0" width="6" height="20" fill="#e74c3c" rx="3" />
    <text x="15" y="16" fill="#e74c3c" class="box-title">监护人</text>
    <text x="15" y="45" class="box-desc">在有限空间外（如地面）对有限空间作业进</text>
    <text x="15" y="67" class="box-desc">行监护的人员。</text>
  </g>

  <g transform="translate(680, 730)">
    <rect x="0" y="0" width="6" height="20" fill="#16a085" rx="3" />
    <text x="15" y="16" fill="#16a085" class="box-title">作业人</text>
    <text x="15" y="45" class="box-desc">进入有限空间实施作业的人员。</text>
  </g>

</svg>
