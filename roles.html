    <line x1="0" y1="-15" x2="-10" y2="0" class="worker" />
    <line x1="0" y1="-15" x2="10" y2="0" class="worker" />

    <path d="M 30 -35 Q 35 -45 40 -35 M 35 -30 Q 42 -42 48 -30" fill="none" stroke="#e67e22" stroke-width="2">
       <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />

    <line x1="0" y1="-15" x2="-10" y2="0" class="worker" />
    <line x1="0" y1="-15" x2="10" y2="0" class="worker" />

    <line x1="0" y1="-40" x2="15" y2="-25" class="worker" />

    <line x1="10" y1="-45" x2="30" y2="-65" stroke="#16a085" stroke-width="2" />

    <text x="15" y="16" fill="#9b59b6" class="box-title">项目发包单位</text>
    <text x="15" y="45" class="box-desc">负责将作业任务进行委托、签订合同的部门。</text>
    <text x="15" y="67" class="box-desc">审核作业单位资质、签订协议、提供技术资料、</text>
    <text x="15" y="89" class="box-desc">办理审批手续，对整体安全进行协调管理。</text>
  </g>

  <g transform="translate(380, 660)">
    <rect x="0" y="0" width="6" height="20" fill="#8e44ad" rx="3" />
    <text x="15" y="16" fill="#8e44ad" class="box-title">项目安全员</text>
    <text x="15" y="45" class="box-desc">由项目发包单位指派，负责对项目整</text>
    <text x="15" y="67" class="box-desc">体安全进行监督检查的人员。</text>
  </g>

  <g transform="translate(730, 660)">
    <rect x="0" y="0" width="6" height="20" fill="#1abc9c" rx="3" />
    <text x="15" y="16" fill="#1abc9c" class="box-title">属地管理单位</text>
    <text x="15" y="45" class="box-desc">有限空间所在区域的直接管理部门。负责辨识、</text>
    <text x="15" y="67" class="box-desc">建档、设置警示标识，并对进入本辖区作业的</text>
    <text x="15" y="89" class="box-desc">单位进行现场安全监管。</text>
  </g>

  <g transform="translate(30, 780)">
    <rect x="0" y="0" width="6" height="20" fill="#2ecc71" rx="3" />
    <text x="15" y="16" fill="#2ecc71" class="box-title">现场安全检查员</text>
    <text x="15" y="45" class="box-desc">由属地管理单位指派，对有限空间</text>
    <text x="15" y="67" class="box-desc">作业现场进行实际管理和检查的人员。</text>
  </g>

  <g transform="translate(380, 780)">
    <rect x="0" y="0" width="6" height="20" fill="#34495e" rx="3" />

    <text x="15" y="45" class="box-desc">负责有限空间作业审批的</text>
    <text x="15" y="67" class="box-desc">人员。</text>
  </g>

  <g transform="translate(730, 780)">
    <rect x="0" y="0" width="6" height="20" fill="#2980b9" rx="3" />
    <text x="15" y="16" fill="#2980b9" class="box-title">作业单位</text>
    <text x="15" y="45" class="box-desc">进入有限空间实施作业的部门或承包商。</text>
    <text x="15" y="67" class="box-desc">是作业安全主体责任方。负责全流程的</text>
    <text x="15" y="89" class="box-desc">设备配备、预案制定及实施管理。</text>
  </g>

  <g transform="translate(30, 910)">
    <rect x="0" y="0" width="6" height="20" fill="#e67e22" rx="3" />
    <text x="15" y="16" fill="#e67e22" class="box-title">作业负责人</text>
    <text x="15" y="45" class="box-desc">在作业现场负责组织实施有限</text>
    <text x="15" y="67" class="box-desc">空间作业的人员。</text>
  </g>

  <g transform="translate(380, 910)">
    <rect x="0" y="0" width="6" height="20" fill="#e74c3c" rx="3" />
    <text x="15" y="16" fill="#e74c3c" class="box-title">监护人</text>
    <text x="15" y="45" class="box-desc">在有限空间外（如地面）对有限</text>
    <text x="15" y="67" class="box-desc">空间作业进行监护的人员。</text>
  </g>

  <g transform="translate(730, 910)">
    <rect x="0" y="0" width="6" height="20" fill="#16a085" rx="3" />
    <text x="15" y="16" fill="#16a085" class="box-title">作业人</text>
    <text x="15" y="45" class="box-desc">进入有限空间实施作业的</text>
