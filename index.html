<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .text-title { font-family: "Microsoft YaHei", sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; text-anchor: middle; }
      .text-desc { font-family: "Microsoft YaHei", sans-serif; font-size: 14px; fill: #7f8c8d; text-anchor: middle; }
      .ground { stroke: #34495e; stroke-width: 5; stroke-linecap: round; }
      .tank { fill: #ecf0f1; stroke: #34495e; stroke-width: 5; stroke-linejoin: round; }
      .hazard-gas { fill: #9b59b6; opacity: 0.6; filter: blur(2px); }
      .worker { stroke: #2c3e50; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .helmet { fill: #f1c40f; }
      .rope { stroke: #e67e22; stroke-width: 2.5; stroke-dasharray: 5,5; }
      .tripod { stroke: #95a5a6; stroke-width: 5; stroke-linecap: round; }
      .divider { stroke: #bdc3c7; stroke-width: 2; stroke-dasharray: 10,10; }
      .vision-line { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 6, 4; }
      .duct { fill: none; stroke: #3498db; stroke-width: 16; stroke-linejoin: round; stroke-linecap: round; }
      .airflow { fill: none; stroke: #ffffff; stroke-width: 4; stroke-dasharray: 12, 12; }
    </style>
  </defs>

  <line x1="400" y1="20" x2="400" y2="480" class="divider" />

  <g>
    <line x1="30" y1="140" x2="160" y2="140" class="ground" />
    <line x1="240" y1="140" x2="370" y2="140" class="ground" />
    
    <path d="M 160 140 L 160 180 L 90 220 L 90 380 L 310 380 L 310 220 L 240 180 L 240 140" class="tank" />
    
    <g>
      <circle cx="150" cy="320" r="25" class="hazard-gas">
        <animate attributeName="cy" values="320;290;320" dur="3s" repeatCount="indefinite" />
        <animate attributeName="r" values="25;30;25" dur="3s" repeatCount="indefinite" />
      </circle>
      <circle cx="250" cy="340" r="35" class="hazard-gas">
        <animate attributeName="cy" values="340;300;340" dur="4s" repeatCount="indefinite" />
        <animate attributeName="cx" values="250;230;250" dur="5s" repeatCount="indefinite" />
      </circle>
      <circle cx="200" cy="280" r="20" class="hazard-gas">
        <animate attributeName="cy" values="280;250;280" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite" />
      </circle>
    </g>

    <polygon points="100,130 120,95 140,130" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="120" y="125" font-size="16" fill="white" font-weight="bold" text-anchor="middle">!</text>
  </g>

  <g>
    <line x1="430" y1="140" x2="560" y2="140" class="ground" />
    <line x1="640" y1="140" x2="770" y2="140" class="ground" />
    
    <path d="M 560 140 L 560 180 L 490 220 L 490 380 L 710 380 L 710 220 L 640 180 L 640 140" class="tank" />
    
    <g>
      <path d="M 470 120 L 470 80 L 580 80 L 580 320" class="duct" />
      <path d="M 470 120 L 470 80 L 580 80 L 580 320" class="airflow">
         <animate attributeName="stroke-dashoffset" values="24;0" dur="0.4s" repeatCount="indefinite" />
      </path>
      <path d="M 580 330 Q 560 360 520 350 M 580 330 Q 600 360 640 350" fill="none" stroke="#3498db" stroke-width="3" stroke-dasharray="8,4">
         <animate attributeName="stroke-dashoffset" values="12;0" dur="0.3s" repeatCount="indefinite" />
      </path>

      <rect x="430" y="100" width="45" height="40" fill="#2c3e50" rx="4" />
      <circle cx="452" cy="120" r="14" fill="#ecf0f1" />
      <path d="M 452 108 L 452 132 M 440 120 L 464 120" stroke="#34495e" stroke-width="3">
         <animateTransform attributeName="transform" type="rotate" from="0 452 120" to="360 452 120" dur="0.15s" repeatCount="indefinite" />
      </path>
    </g>

    <g>
      <circle cx="650" cy="340" r="15" class="hazard-gas" fill="#3498db">
        <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" repeatCount="indefinite" />
        <animate attributeName="r" values="15;20;15" dur="1.5s" repeatCount="indefinite" />
      </circle>
    </g>

    <line x1="630" y1="40" x2="590" y2="140" class="tripod" />
    <line x1="630" y1="40" x2="670" y2="140" class="tripod" />
    <circle cx="630" cy="40" r="8" fill="#7f8c8d" />
    <rect x="600" y="90" width="12" height="18" fill="#34495e" /> <line x1="630" y1="40" x2="630" y2="290" class="rope" /> <g transform="translate(730, 140)">
      <line x1="0" y1="-45" x2="0" y2="-15" class="worker" />
      <line x1="0" y1="-15" x2="-10" y2="0" class="worker" />
      <line x1="0" y1="-15" x2="10" y2="0" class="worker" />
      <circle cx="0" cy="-55" r="10" stroke="#2c3e50" stroke-width="2.5" fill="#ecf0f1" />
      <path d="M -12 -57 A 12 12 0 0 1 12 -57 Z" class="helmet" />
      
      <line x1="0" y1="-40" x2="-20" y2="-35" class="worker" />
      <rect x="-26" y="-40" width="8" height="12" fill="#e74c3c" rx="2" />
      <circle cx="-22" cy="-38" r="1.5" fill="#2ecc71">
          <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
      </circle>
      
      <path d="M -22 -28 Q -20 20 -70 50 Q -100 80 -80 180" stroke="#f1c40f" stroke-width="2" fill="none" stroke-dasharray="4,2" />
      <circle cx="-80" cy="180" r="3" fill="#e74c3c" /> <line x1="-10" y1="-55" x2="-90" y2="-10" class="vision-line">
         <animate attributeName="stroke-dashoffset" values="10;0" dur="0.8s" repeatCount="indefinite" />
      </line>
      <line x1="-10" y1="-55" x2="-120" y2="80" class="vision-line">
         <animate attributeName="stroke-dashoffset" values="10;0" dur="1.2s" repeatCount="indefinite" />
      </line>
    </g>

    <g transform="translate(630, 310)">
      <circle cx="0" cy="-35" r="12" stroke="#2c3e50" stroke-width="3" fill="#ecf0f1" />
      <path d="M -14 -38 A 14 14 0 0 1 14 -38 Z" class="helmet" />
      <line x1="0" y1="-23" x2="0" y2="15" class="worker" />
      <path d="M -8 -15 L 8 -15 M -8 5 L 8 5" stroke="#e74c3c" stroke-width="2" /> <line x1="0" y1="-15" x2="-18" y2="0" class="worker">
         <animate attributeName="y2" values="0; -8; 0" dur="1s" repeatCount="indefinite" />
      </line>
      <line x1="0" y1="-15" x2="18" y2="0" class="worker">
         <animate attributeName="y2" values="0; 8; 0" dur="1s" repeatCount="indefinite" />
      </line>
      <line x1="0" y1="15" x2="-15" y2="50" class="worker" />
      <line x1="0" y1="15" x2="15" y2="50" class="worker" />
    </g>
  </g>

  <text x="200" y="440" class="text-title">有限空间</text>
  <text x="200" y="465" class="text-desc">(固有危险物理环境)</text>
  <text x="200" y="485" class="text-desc">通风不良 / 毒气积聚 / 缺氧</text>
  
  <text x="600" y="440" class="text-title">有限空间作业</text>
  <text x="600" y="465" class="text-desc">(规范的安全作业流程)</text>
  <text x="600" y="485" class="text-desc">地面风机送风 / 专人监护 / 实时监测</text>

</svg>
